[storage]
root = "storage"

[factor_spec]
id = "research_industry_v4_v1_1"
universe_name = "tradable_core"
start_date = "2024-01-02"

[research_snapshot]
as_of_date = "2026-03-27"

[factors]
output_path = "research/factors/research_industry_v4_v1_1/tradable_core/start_2024-01-02/asof_2026-03-27.parquet"

[training]
label_column = "industry_excess_fwd_return_5"
train_window_months = 12
test_start_month = "2025-01"
test_end_month = "2026-02"
score_output_path = "research/models/walk_forward_scores_industry_v4_v1_1.parquet"
metric_output_path = "research/models/walk_forward_metrics_industry_v4_v1_1.json"

[analysis]
layer_output_path = "research/models/walk_forward_layer_analysis_industry_v4_v1_1.json"

[qlib]
provider_uri = "~/.qlib/qlib_data/cn_data"
region = "cn"
market = "csi300"
model_name = "lgbm"
config_id = "research_industry_v4_v1_1_qlib"

[model_backtest]
output_dir = "results/model_score_backtest_walk_forward_industry_v4_v1_1"
start_date = "2025-01-03"
end_date = "2026-03-27"
top_k = 6
rebalance_every = 5
lookback_window = 20
min_hold_bars = 8
keep_buffer = 2
min_turnover_names = 3
min_daily_amount = 0
max_names_per_industry = 2
initial_cash = 100000
commission_rate = 0.0003
stamp_tax_rate = 0.001
slippage_rate = 0.0005
