<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">A Share Quant Research Workspace Core Workflow</title>
  <desc id="desc">Core project workflow from data preparation to research, scoring, backtest, simulation, and web console.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355C7D"/>
    </marker>
    <style>
      .label { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14213D; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #355C7D; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14213D; }
      .box { stroke: #355C7D; stroke-width: 2.5; rx: 8; }
      .line { stroke: #355C7D; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="420" fill="#F7F9FC"/>
  <text x="60" y="58" class="title">Core Workflow</text>

  <rect class="box" x="60" y="110" width="190" height="92" fill="#D9F0FF"/>
  <text x="155" y="148" text-anchor="middle" class="label">Data Prep</text>
  <text x="155" y="173" text-anchor="middle" class="small">Demo data / Real data</text>

  <rect class="box" x="290" y="110" width="190" height="92" fill="#E9E4FF"/>
  <text x="385" y="148" text-anchor="middle" class="label">Research Config</text>
  <text x="385" y="173" text-anchor="middle" class="small">Native / Qlib</text>

  <rect class="box" x="520" y="110" width="190" height="92" fill="#FFF0D9"/>
  <text x="615" y="148" text-anchor="middle" class="label">Factor Build</text>
  <text x="615" y="173" text-anchor="middle" class="small">Universe and samples</text>

  <rect class="box" x="750" y="110" width="190" height="92" fill="#DFF7E2"/>
  <text x="845" y="148" text-anchor="middle" class="label">Model Research</text>
  <text x="845" y="173" text-anchor="middle" class="small">Training and rolling runs</text>

  <rect class="box" x="980" y="110" width="190" height="92" fill="#FFE2E8"/>
  <text x="1075" y="148" text-anchor="middle" class="label">Score Output</text>
  <text x="1075" y="173" text-anchor="middle" class="small">Scores and metrics</text>

  <rect class="box" x="940" y="268" width="190" height="92" fill="#FDEBD3"/>
  <text x="1035" y="306" text-anchor="middle" class="label">Score Backtest</text>
  <text x="1035" y="331" text-anchor="middle" class="small">Return, drawdown, holdings</text>

  <rect class="box" x="1180" y="268" width="190" height="92" fill="#D9F4EC"/>
  <text x="1275" y="306" text-anchor="middle" class="label">Latest and Premarket</text>
  <text x="1275" y="331" text-anchor="middle" class="small">Selection and trade plan</text>

  <rect class="box" x="1180" y="110" width="190" height="92" fill="#E8EEF9"/>
  <text x="1275" y="148" text-anchor="middle" class="label">Web Console / CLI</text>
  <text x="1275" y="173" text-anchor="middle" class="small">View runs and operate flows</text>

  <path class="line" d="M250 156 H290"/>
  <path class="line" d="M480 156 H520"/>
  <path class="line" d="M710 156 H750"/>
  <path class="line" d="M940 156 H980"/>
  <path class="line" d="M1170 156 H1180"/>
  <path class="line" d="M1075 202 V252"/>
  <path class="line" d="M1120 156 C1150 156 1155 156 1172 156"/>
  <path class="line" d="M1170 308 H1180"/>
</svg>
